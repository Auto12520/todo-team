<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>Task Manager</title>

<style>

body{
font-family:Arial;
background:#F5F7FB;
margin:0;
}

header{
background:#6366F1;
color:white;
padding:20px;
text-align:center;
}

.container{
width:900px;
margin:auto;
margin-top:30px;
}

.form-box{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input,select{
width:95%;
padding:10px;
margin:5px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px 15px;
border:none;
border-radius:5px;
cursor:pointer;
}

.add{
background:#6366F1;
color:white;
}

.done{
background:#22C55E;
color:white;
}

.delete{
background:#EF4444;
color:white;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:30px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.1);
}

.status{
font-weight:bold;
}

</style>

</head>

<body>

<header>

<h1>Team Task Manager</h1>

</header>

<div class="container">

<div class="form-box">

<h2>Add Task</h2>

<input id="name" placeholder="Employee Name">

<input id="email" placeholder="Email">

<select id="team">

<option>Frontend</option>
<option>Backend</option>
<option>Design</option>

</select>

<input id="task" placeholder="Task">

<br><br>

<button class="add" onclick="addTask()">Add Task</button>

</div>

<div class="grid" id="taskBoard"></div>

</div>

<script>

let tasks=JSON.parse(localStorage.getItem("tasks"))||[]

render()

function addTask(){

let name=nameInput.value
let email=emailInput.value
let team=teamInput.value
let task=taskInput.value

let data={

name:name,
email:email,
team:team,
task:task,
done:false

}

tasks.push(data)

save()

render()

}

function render(){

let board=document.getElementById("taskBoard")

board.innerHTML=""

tasks.forEach((t,i)=>{

let card=document.createElement("div")

card.className="card"

card.innerHTML=

`
<h3>${t.name}</h3>

<p>${t.team} Team</p>

<p>Task : ${t.task}</p>

<p class="status">
${t.done ? "Done" : "Pending"}
</p>

<button class="done" onclick="finish(${i})">Done</button>
<button class="delete" onclick="removeTask(${i})">Delete</button>
`

board.appendChild(card)

})

}

function finish(i){

tasks[i].done=true

save()

render()

}

function removeTask(i){

tasks.splice(i,1)

save()

render()

}

function save(){

localStorage.setItem("tasks",JSON.stringify(tasks))

}

</script>

</body>

</html>
